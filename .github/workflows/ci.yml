name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      node:
        description: "Node version"
        required: true
        default: 22.x
        type: choice
        options:
          - 20.x
          - 22.x
      rolldown:
        description: "Rolldown version"
        required: true
        default: ^1
        type: choice
        options:
          - ^1

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]
        rolldown-version: [^1]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        id: pnpm-install
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies
      - name: Check code
        run: pnpm run check
      - name: Install rolldown version ${{ matrix.rolldown-version }}
        run: pnpm add -D rolldown@${{ matrix.rolldown-version }}
      - name: Test code
        run: pnpm run test
